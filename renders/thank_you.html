<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtru</title>
</head>
<style>
:root {  
  --purple: rgb(13, 56, 72);
  --violet: rgb(36, 61, 111);
  --pink: rgb(77, 100, 138);
}

*{
    background-color: black;
}

@keyframes background-pan {
  from {
    background-position: 0% center;
  }
  
  to {
    background-position: -200% center;
  }
}

@keyframes scale {
  from, to {
    transform: scale(0);
  }
  
  50% {
    transform: scale(1);
  }
}

@keyframes rotate {
  from {
    transform: rotate(0deg);
  }
  
  to {
    transform: rotate(180deg);
  }
}

body {
background-color: rgb(240, 240, 240); 
  display: grid;
  height: 100vh;
  margin: 0px;
  overflow: hidden;
  place-items: center;
}

h1 {
  color: black;
  font-family: "Rubik", sans-serif;
  font-size: clamp(4em, 4vw, 6em);
  font-weight: 400;
  margin: 0px;
  text-align: center;
}

h1 > .magic {
  display: inline-block;
  position: relative;
}

h1 > .magic > .magic-star {
  --size: clamp(20px, 1.5vw, 30px);
  
  animation: scale 700ms ease forwards;
  display: block;
  height: var(--size);
  left: var(--star-left);
  position: absolute;
  top: var(--star-top);
  width: var(--size);
}

h1 > .magic > .magic-star > svg > path {
  fill: var(--violet);
}

h1 > .magic > .magic-text {
  animation: background-pan 3s linear infinite;
  background: linear-gradient(
    to right,
    var(--purple),
    var(--violet),
    var(--pink),
    var(--purple)
  );
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}

@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
</style>
<body style="animation:fadeIn 5s">
        <h1 style="font-size: clamp(6em, 6vw, 8em); background-color: rgb(240, 240, 240)">
            Thank you for installing 
            <span style="background-color: rgb(240, 240, 240)" class="magic">
                <span class="magic-text">Filtru</span>
            </span>
            <br>
            <span style="font-size:50px; cursor:pointer; background-color: rgb(240, 240, 240)"><a href="https://app.filtru.xyz/" style="all: unset; color:rgb(77, 100, 138)">Let's get started</a></span>
        </h1>
</body>
</html>
