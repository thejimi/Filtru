<style>
.centered {
  position: fixed;
  top: 50%;
  left: 50%;
  /* bring your own prefixes */
  transform: translate(-50%, -50%);
  width:1000px;
  text-align: center;
}

.filtru_searchinput {
  width: 500px;
  padding: 12px 20px;
  margin: 8px 0;
  box-sizing: border-box;
  border: 3px solid #2a2a2a;
  -webkit-transition: 0.5s;
  transition: 0.5s;
  outline: none;
  background: none;
  color:white;
  border-radius: 100px;
}

.filtru_searchinput:focus {
  border: 3px solid #555;
}
</style>

<div class="centered">
    <h1 style="color:#c5c5c5;font-size:80px">Search</h1>
    <input type="text" id="filtru_search" name="Search" class="filtru_searchinput" placeholder="Enter a search and press enter">
</div>
